services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fpa
      POSTGRES_PASSWORD: fpa
      POSTGRES_DB: fpa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  pgdata:
